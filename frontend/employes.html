<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zone Franche - Gestion des Employés</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    // Configuration optionnelle pour étendre des couleurs si nécessaire
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            zfDark: '#0B2545',
            zfSuccess: '#10b981'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 p-8 text-slate-800 selection:bg-emerald-500 selection:text-white">

  <div class="max-w-5xl mx-auto flex justify-between items-center mb-8 border-b border-slate-200 pb-4">
    <div>
      <h2 class="text-xl font-black tracking-widest text-slate-900 font-mono">NAVIGATION // EMPLOYÉS</h2>
      <p class="text-xs text-slate-400 font-mono mt-1">MODULE DE GESTION DU PERSONNEL ET DES ACCÈS</p>
    </div>
    <button id="btn-ouvrir-form" class="bg-[#0B2545] hover:bg-slate-800 text-white font-mono text-xs font-bold tracking-wider uppercase py-3 px-6 rounded-sm border border-slate-700 shadow-sm transition-all duration-200">
      + Ajouter un employé
    </button>
  </div>

  <div id="conteneur-formulaire" class="hidden max-w-4xl mx-auto bg-white border border-slate-200 p-6 rounded-sm shadow-sm mb-8 transition-all">
    <h3 class="text-sm font-black text-slate-700 tracking-widest font-mono uppercase mb-6 border-b border-slate-100 pb-3">
      INSCRIPTION NOUVEL EMPLOYÉ //
    </h3>
    
    <form id="form-employe" class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
        
        <div class="flex flex-col">
          <label class="text-[11px] font-black tracking-wider text-slate-500 uppercase font-mono mb-1.5">Code Matricule //</label>
          <input type="text" id="matricule_emp" placeholder="ex: EMP-2026-012" required
            class="border border-slate-300 rounded-sm p-2.5 text-sm font-mono focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 bg-slate-50/50">
        </div>
        
        <div class="flex flex-col">
          <label class="text-[11px] font-black tracking-wider text-slate-500 uppercase font-mono mb-1.5">Nom de l'employé</label>
          <input type="text" id="nom_emp" placeholder="NOM" required
            class="border border-slate-300 rounded-sm p-2.5 text-sm focus:outline-none focus:border-[#0B2545] bg-slate-50/50">
        </div>
        
        <div class="flex flex-col">
          <label class="text-[11px] font-black tracking-wider text-slate-500 uppercase font-mono mb-1.5">Prénom</label>
          <input type="text" id="prenom_emp" placeholder="Prénom" required
            class="border border-slate-300 rounded-sm p-2.5 text-sm focus:outline-none focus:border-[#0B2545] bg-slate-50/50">
        </div>

        <div class="flex flex-col">
          <label class="text-[11px] font-black tracking-wider text-slate-500 uppercase font-mono mb-1.5">Numéro CIN</label>
          <input type="text" id="cin_emp" placeholder="12 chiffres" required
            class="border border-slate-300 rounded-sm p-2.5 text-sm font-mono focus:outline-none focus:border-[#0B2545] bg-slate-50/50">
        </div>
        
        <div class="flex flex-col">
          <label class="text-[11px] font-black tracking-wider text-slate-500 uppercase font-mono mb-1.5">Adresse Résidentielle</label>
          <input type="text" id="adresse_emp" placeholder="Ville/Quartier" required
            class="border border-slate-300 rounded-sm p-2.5 text-sm focus:outline-none focus:border-[#0B2545] bg-slate-50/50">
        </div>
        
        <div class="flex flex-col">
          <label class="text-[11px] font-black tracking-wider text-slate-500 uppercase font-mono mb-1.5">Contact Téléphonique</label>
          <input type="text" id="tel_emp" placeholder="ex: 0340011111" required
            class="border border-slate-300 rounded-sm p-2.5 text-sm font-mono focus:outline-none focus:border-[#0B2545] bg-slate-50/50">
        </div>

        <div class="flex flex-col">
          <label class="text-[11px] font-black tracking-wider text-slate-500 uppercase font-mono mb-1.5">ID Catégorie Pro</label>
          <input type="number" id="id_categorie" value="1" required
            class="border border-slate-300 rounded-sm p-2.5 text-sm font-mono focus:outline-none focus:border-[#0B2545] bg-slate-50/50">
        </div>
        
        <div class="flex flex-col">
          <label class="text-[11px] font-black tracking-wider text-slate-500 uppercase font-mono mb-1.5">Heure Début Prévu</label>
          <input type="time" id="heure_deb_prev" value="07:30" required
            class="border border-slate-300 rounded-sm p-2.5 text-sm font-mono focus:outline-none focus:border-[#0B2545] bg-slate-50/50">
        </div>
        
        <div class="flex flex-col">
          <label class="text-[11px] font-black tracking-wider text-slate-500 uppercase font-mono mb-1.5">Heure Fin Prévu</label>
          <input type="time" id="heure_fin_prev" value="16:30" required
            class="border border-slate-300 rounded-sm p-2.5 text-sm font-mono focus:outline-none focus:border-[#0B2545] bg-slate-50/50">
        </div>

      </div>

      <div class="flex justify-end pt-2">
        <button type="submit" class="w-full md:w-auto bg-emerald-500 hover:bg-emerald-600 text-white font-mono text-xs font-bold tracking-widest uppercase py-3.5 px-8 rounded-sm shadow-sm transition-all duration-150">
          Enregistrer & Générer le Badge Matrix
        </button>
      </div>
    </form>
  </div>

  <div id="zone-badge" class="hidden flex flex-col items-center mt-12 animate-fade-in">
    
    <div class="w-80 h-[480px] bg-white border border-slate-300 rounded-sm shadow-2xl overflow-hidden flex flex-col justify-between font-mono relative">
      <div class="h-1.5 bg-emerald-500 w-full"></div>
      
      <div class="bg-[#0B2545] text-white text-center py-5 px-4 border-b border-slate-800">
        <h4 class="text-base font-black tracking-[0.25em] text-slate-100">ZONE FRANCHE</h4>
        <p class="text-[9px] tracking-widest text-emerald-400 font-bold uppercase mt-1">SÉCURITÉ // PRO-ID BADGE</p>
      </div>
      
      <div class="flex flex-col items-center justify-around flex-grow p-6 text-center bg-radial">
        
        <div class="w-24 h-24 rounded-none bg-slate-100 border border-slate-300 flex items-center justify-center relative shadow-inner">
          <div class="absolute inset-1 border border-dashed border-slate-300"></div>
          <span class="text-slate-400 font-bold text-xs tracking-wider">PHOTO</span>
          <div class="absolute top-0 right-0 w-1.5 h-1.5 bg-emerald-500"></div>
        </div>
        
        <div class="space-y-1 mt-2">
          <h3 id="badge-nom" class="text-lg font-black text-slate-900 tracking-wide uppercase">-- --</h3>
          <p id="badge-role" class="text-xs font-bold text-slate-500 uppercase tracking-wider">Piqueur (Confection)</p>
          
          <div class="inline-block bg-slate-50 border border-slate-200 rounded-sm px-3 py-1 mt-2">
            <span class="text-[11px] text-slate-400 font-bold">SYS_ID //</span>
            <span id="badge-matricule" class="text-[11px] text-[#0B2545] font-black">--</span>
          </div>
        </div>
        
        <div class="p-2 border border-slate-200 bg-white shadow-sm rounded-sm mt-2">
          <div id="badge-qrcode" class="w-[90px] h-[90px]"></div>
        </div>

      </div>
      
      <div class="bg-slate-900 border-t border-slate-800 text-center py-2.5">
        <div class="flex items-center justify-center space-x-2">
          <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
          <span class="text-[10px] font-black tracking-widest text-slate-300 uppercase">STATUT SYSTEME : ACTIF</span>
        </div>
      </div>
    </div>
    
    <button onclick="window.print()" class="mt-6 border border-[#0B2545] text-[#0B2545] hover:bg-[#0B2545] hover:text-white font-mono text-xs font-bold tracking-widest uppercase py-2.5 px-6 rounded-sm transition-all duration-200">
      Imprimer le Fichier ID
    </button>
  </div>

  <script>
    // Gestion de l'affichage du formulaire au clic
    document.getElementById('btn-ouvrir-form').addEventListener('click', () => {
      const formContainer = document.getElementById('conteneur-formulaire');
      formContainer.classList.toggle('hidden');
    });

    // Interception de la soumission pour l'API REST
    document.getElementById('form-employe').addEventListener('submit', function(e) {
      e.preventDefault();

      // Extraction des inputs au format exact attendu par ton API Node.js
      const nouvelEmploye = {
        matricule_emp: document.getElementById('matricule_emp').value,
        nom_emp: document.getElementById('nom_emp').value.toUpperCase(),
        prenom_emp: document.getElementById('prenom_emp').value,
        cin_emp: document.getElementById('cin_emp').value,
        adresse_emp: document.getElementById('adresse_emp').value,
        tel_emp: document.getElementById('tel_emp').value,
        id_categorie: parseInt(document.getElementById('id_categorie').value),
        heure_deb_prev: document.getElementById('heure_deb_prev').value,
        heure_fin_prev: document.getElementById('heure_fin_prev').value,
        date_embauche: new Date().toISOString()
      };

      // Envoi de la requête POST réelle vers ton API Express (Port 3005)
      fetch('http://127.0.0.1:3005/api/employes/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(nouvelEmploye)
      })
      .then(response => {
        if (!response.ok) throw new Error("Erreur de transmission réseau");
        return response.json();
      })
      .then(data => {
        // Succès : Remplissage des données du Badge
        document.getElementById('badge-nom').innerText = `${nouvelEmploye.nom_emp} ${nouvelEmploye.prenom_emp}`;
        document.getElementById('badge-matricule').innerText = nouvelEmploye.matricule_emp;
        
        // Reset de l'ancienne boîte QR Code
        const qrcodeBox = document.getElementById('badge-qrcode');
        qrcodeBox.innerHTML = "";

        // Génération du QR Code pointant sur l'URL unique de ton API Rest pour cet employé
        new QRCode(qrcodeBox, {
          text: `http://127.0.0.1:3005/api/employes/${nouvelEmploye.matricule_emp}`,
          width: 90,
          height: 90,
          colorDark : "#0B2545",
          colorLight : "#ffffff"
        });

        // Rendre le badge visible à l'écran
        document.getElementById('zone-badge').classList.remove('hidden');
        
        // Masquer et reset le formulaire après succès
        document.getElementById('conteneur-formulaire').classList.add('hidden');
        document.getElementById('form-employe').reset();
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      })
      .catch(error => {
        console.error("Échec de l'insertion API :", error);
        alert("Erreur système : Impossible d'enregistrer le matricule.");
      });
    });
  </script>

  <style>
    @media print {
      body * { display: none !important; }
      #zone-badge, #zone-badge * { display: flex !important; }
      button { display: none !important; }
    }
  </style>
</body>
</html>
